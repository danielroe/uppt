name: 'uppt/publish'
description: 'Pack and stage-publish to npm using OIDC trusted publishing.'
author: 'Daniel Roe'

branding:
  icon: 'package'
  color: 'black'

inputs:
  node-version:
    description: 'Node version for the scripts and for `npm stage publish`. Needs `--experimental-strip-types` support (22.6+, 24+ recommended).'
    required: false
    default: '24'
  npm-access:
    description: 'npm access level (`public` or `restricted`).'
    required: false
    default: 'public'
  checkout:
    description: 'Whether the action should run `actions/checkout` itself. Set to `false` if the caller has already checked out the tag ref.'
    required: false
    default: 'true'

runs:
  using: composite
  steps:
    - name: Validate event
      shell: bash
      env:
        EVENT_NAME: ${{ github.event_name }}
      run: |
        set -euo pipefail
        case "$EVENT_NAME" in
          push|workflow_dispatch) ;;
          *)
            echo "::error::danielroe/uppt/publish only supports 'push' and 'workflow_dispatch' events, got '$EVENT_NAME'."
            exit 1
            ;;
        esac
        if [ "${GITHUB_REF:-}" = "${GITHUB_REF#refs/tags/v}" ]; then
          echo "::error::danielroe/uppt/publish expected a 'refs/tags/v*' ref, got '${GITHUB_REF:-<unset>}'."
          exit 1
        fi

    - name: Checkout
      if: inputs.checkout == 'true'
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false

    - name: Setup Node
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: ${{ inputs.node-version }}
        registry-url: 'https://registry.npmjs.org'
        package-manager-cache: false

    - name: Update npm
      shell: bash
      run: npm install -g npm@latest

    - name: Install dependencies
      shell: bash
      env:
        COREPACK_ENABLE_STRICT: '1'
        COREPACK_ENABLE_DOWNLOAD_PROMPT: '0'
      run: |
        set -euo pipefail
        if [ -f pnpm-lock.yaml ]; then
          corepack enable
          pnpm install --frozen-lockfile --ignore-scripts
        elif [ -f yarn.lock ]; then
          corepack enable
          yarn install --immutable --mode=skip-build || yarn install --frozen-lockfile --ignore-scripts
        elif [ -f package-lock.json ]; then
          npm ci --ignore-scripts
        else
          npm install --ignore-scripts --no-package-lock
        fi

    - name: Publish to npm
      shell: bash
      env:
        NPM_ACCESS: ${{ inputs.npm-access }}
      run: node --experimental-strip-types ${{ github.action_path }}/../scripts/publish.ts
