name: 'uppt/publish'
description: 'Stage-publish a prebuilt tarball to npm using OIDC trusted publishing.'
author: 'Daniel Roe'

branding:
  icon: 'package'
  color: 'black'

inputs:
  node-version:
    description: 'Node version for the scripts and for `npm stage publish`. Needs `--experimental-strip-types` support (22.6+, 24+ recommended).'
    required: false
    default: '24'
  npm-access:
    description: 'npm access level (`public` or `restricted`).'
    required: false
    default: 'public'
  files:
    description: 'Optional JSON array of tarball filenames to publish, as emitted by `uppt/pack`''s `files` output. When omitted, the action publishes every `*.tgz` it finds in the downloaded artifact.'
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Validate event
      shell: bash
      env:
        EVENT_NAME: ${{ github.event_name }}
      run: |
        set -euo pipefail
        case "$EVENT_NAME" in
          push|workflow_dispatch) ;;
          *)
            echo "::error::danielroe/uppt/publish only supports 'push' and 'workflow_dispatch' events, got '$EVENT_NAME'."
            exit 1
            ;;
        esac
        if [ "${GITHUB_REF:-}" = "${GITHUB_REF#refs/tags/v}" ]; then
          echo "::error::danielroe/uppt/publish expected a 'refs/tags/v*' ref, got '${GITHUB_REF:-<unset>}'."
          exit 1
        fi

    - name: Setup Node
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: ${{ inputs.node-version }}
        registry-url: 'https://registry.npmjs.org'
        package-manager-cache: false

    - name: Update npm
      shell: bash
      run: npm install -g npm@latest

    - name: Download tarball artifact
      uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
      with:
        name: uppt-tarball
        path: ${{ runner.temp }}/uppt-tarballs

    - name: Publish to npm
      shell: bash
      env:
        NPM_ACCESS: ${{ inputs.npm-access }}
        TARBALL_DIR: ${{ runner.temp }}/uppt-tarballs
        TARBALL_FILES: ${{ inputs.files }}
      run: node --experimental-strip-types ${{ github.action_path }}/../scripts/publish.ts
