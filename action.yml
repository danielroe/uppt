name: 'uppt'
description: 'Open release PRs from conventional commits, tag on merge, publish to npm via OIDC.'
author: 'Daniel Roe'

branding:
  icon: 'package'
  color: 'black'

inputs:
  mode:
    description: |
      `auto` (default), `pr`, `release`, or `publish`.

      - `pr`: parse commits since the last tag, open or update a draft release PR.
      - `release`: tag the merged release PR, create a GitHub release, dispatch publish.
      - `publish`: pack + publish to npm using OIDC trusted publishing.
      - `auto`: pick one of the above from `github.event_name` and PR state.
    required: false
    default: auto
  token:
    description: |
      GitHub token. Required for `release` (tag push, release create, workflow dispatch).
      Recommended for `pr` (rate limit + private repo PR write). Not used by `publish`.
    required: false
    default: ${{ github.token }}
  base-branch:
    description: 'Branch the release PR is opened against.'
    required: false
    default: ${{ github.event.repository.default_branch }}
  node-version:
    description: 'Node version for the scripts and for `publish`.'
    required: false
    default: '24'
  npm-access:
    description: 'npm access level for publish (`public` or `restricted`).'
    required: false
    default: 'public'
  publish-workflow:
    description: 'Workflow filename to dispatch after tagging (must accept `workflow_dispatch`).'
    required: false
    default: 'release.yml'
  checkout:
    description: |
      Whether the action should run `actions/checkout` itself. Set to `false` if the
      caller has already checked out the right ref (with `fetch-depth: 0` for `pr`,
      and `ref: github.event.pull_request.merge_commit_sha` for `release`).
    required: false
    default: 'true'

runs:
  using: composite
  steps:
    - name: Resolve mode
      id: mode
      shell: bash
      env:
        MODE_INPUT: ${{ inputs.mode }}
        EVENT_NAME: ${{ github.event_name }}
        PR_MERGED: ${{ github.event.pull_request.merged }}
        PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
      run: |
        set -euo pipefail
        mode="$MODE_INPUT"
        if [ "$mode" = "auto" ]; then
          case "$EVENT_NAME" in
            push)
              # `push: tags: ['v*']` for publish; default-branch push for pr.
              if [ "${GITHUB_REF:-}" != "${GITHUB_REF#refs/tags/v}" ]; then
                mode=publish
              else
                mode=pr
              fi
              ;;
            workflow_dispatch)
              # workflow_dispatch has two reasons to fire: the chained dispatch
              # from `release` mode (always on a `vX.Y.Z` tag ref, lands as
              # `publish`), and manual publish recovery (also on a tag ref).
              # Dispatch on a non-tag ref is unsupported here: `pr` mode is
              # intentionally not exposed via manual dispatch, because routing
              # by ref-shape is too implicit. Use a `push` to the default
              # branch (or re-run the last `pr` job) to refresh the release PR.
              if [ "${GITHUB_REF:-}" != "${GITHUB_REF#refs/tags/v}" ]; then
                mode=publish
              else
                mode=skip
              fi
              ;;
            pull_request_target)
              if [ "$PR_MERGED" = "true" ] && [ "${PR_HEAD_REF#release/v}" != "$PR_HEAD_REF" ]; then
                mode=release
              else
                mode=skip
              fi
              ;;
            *)
              mode=skip
              ;;
          esac
        fi
        echo "mode=$mode" >> "$GITHUB_OUTPUT"
        echo "Resolved mode: $mode (event: $EVENT_NAME)"

    - name: Checkout (pr)
      if: steps.mode.outputs.mode == 'pr' && inputs.checkout == 'true'
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      with:
        fetch-depth: 0
        token: ${{ inputs.token }}

    - name: Checkout (release)
      if: steps.mode.outputs.mode == 'release' && inputs.checkout == 'true'
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      with:
        fetch-depth: 0
        ref: ${{ github.event.pull_request.merge_commit_sha }}
        token: ${{ inputs.token }}

    - name: Checkout (publish)
      if: steps.mode.outputs.mode == 'publish' && inputs.checkout == 'true'
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

    - name: Enable corepack
      if: steps.mode.outputs.mode == 'publish'
      shell: bash
      run: corepack enable

    - name: Setup Node
      uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
      with:
        node-version: ${{ inputs.node-version }}
        registry-url: ${{ steps.mode.outputs.mode == 'publish' && 'https://registry.npmjs.org' || '' }}

    - name: Update npm
      if: steps.mode.outputs.mode == 'publish'
      shell: bash
      run: npm install -g npm@latest

    - name: Install dependencies
      if: steps.mode.outputs.mode == 'publish'
      shell: bash
      run: |
        set -euo pipefail
        if [ -f pnpm-lock.yaml ]; then
          pnpm install --frozen-lockfile --ignore-scripts
        elif [ -f yarn.lock ]; then
          yarn install --immutable --mode=skip-build || yarn install --frozen-lockfile --ignore-scripts
        elif [ -f package-lock.json ]; then
          npm ci --ignore-scripts
        else
          npm install --ignore-scripts --no-package-lock
        fi

    - name: Update changelog and open/update release PR
      if: steps.mode.outputs.mode == 'pr'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.token }}
        RELEASE_BASE: ${{ inputs.base-branch }}
      run: node --experimental-strip-types ${{ github.action_path }}/scripts/update-changelog.ts

    - name: Tag merged release PR and dispatch publish
      if: steps.mode.outputs.mode == 'release'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.token }}
        PR_BODY: ${{ github.event.pull_request.body }}
        PUBLISH_WORKFLOW: ${{ inputs.publish-workflow }}
      run: node --experimental-strip-types ${{ github.action_path }}/scripts/tag-and-release.ts

    - name: Publish to npm
      if: steps.mode.outputs.mode == 'publish'
      shell: bash
      env:
        NPM_ACCESS: ${{ inputs.npm-access }}
      run: node --experimental-strip-types ${{ github.action_path }}/scripts/publish.ts

    - name: Skip
      if: steps.mode.outputs.mode == 'skip'
      shell: bash
      run: echo "No-op for this event."
