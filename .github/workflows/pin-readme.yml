name: pin-readme

# After a release tag lands, rewrite the `uses: danielroe/uppt/*@<ref>`
# lines in README.md to pin to the new tag's SHA and commit straight
# to main. See scripts/pin-readme.ts for the rewrite logic.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions: {}

jobs:
  pin:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # push the README update directly to main
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - name: Pin README and push to main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/pin-readme.ts
