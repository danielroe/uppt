name: pin-readme

# After a release tag lands, rewrite the `uses: danielroe/uppt/*@<ref>`
# lines in README.md to pin to the new tag's SHA and commit straight
# to main. See scripts/pin-readme.ts for the rewrite logic.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions: {}

concurrency:
  group: pin-readme
  cancel-in-progress: false

jobs:
  pin:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # push the README update directly to main
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          package-manager-cache: false

      - name: Pin README and push to main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/pin-readme.ts
